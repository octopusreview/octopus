name: Apply blog taxonomy

# Applies the reviewed category/tags in apps/web/scripts/data/blog-taxonomy.json
# to existing posts via the authenticated PATCH /api/blog (public API — no DB
# access needed). Manual dispatch; dry-run unless `apply` is true.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Write changes (unchecked = dry-run preview)"
        type: boolean
        default: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      # Pinned to full commit SHAs (see octp-release.yml for rationale).
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.4
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Apply taxonomy
        env:
          BLOG_API_TOKEN: ${{ secrets.BLOG_API_TOKEN }}
          OCTOPUS_API_URL: https://octopus-review.ai
        run: |
          bun run apps/web/scripts/apply-blog-taxonomy.ts ${{ inputs.apply && '--apply' || '' }}
