# Octopus → Databricks Asset Bundle
# Deploys to FEVM workspace `octopus-ai` (AWS us-east-1).
# Resources: VS endpoint + indexes, AI Gateway endpoints (Claude/OpenAI/Gemini/Embeddings),
# Lakebase Autoscale (provisioned via bootstrap job), Databricks App, secret scope.

bundle:
  name: octopus

include:
  - resources/*.yml

variables:
  workspace_host:
    description: "Databricks workspace host (FEVM octopus-ai)"
    default: "https://fevm-octopus-ai.cloud.databricks.com"
  catalog:
    description: "Unity Catalog catalog for VS indexes + AI Gateway inference tables"
    default: "octopus_ai_catalog"
  vs_schema:
    description: "Schema under catalog for Vector Search indexes"
    default: "vectors"
  gateway_schema:
    description: "Schema under catalog for AI Gateway inference tables"
    default: "gateway"
  app_name:
    default: "octopus"
  vs_endpoint_name:
    default: "octopus-vs"
  vs_dimension:
    description: "Embedding dimensions — must match the upstream embed model. databricks-gte-large-en (AI Gateway) = 1024; OpenAI text-embedding-3-large (local dev) = 3072."
    default: 1024
  lakebase_project:
    default: "octopus-app"
  secret_scope:
    default: "octopus-octopus-ai"

workspace:
  host: https://fevm-octopus-ai.cloud.databricks.com

sync:
  # Force-include the assembled app source — _stage/node_modules must travel
  # with the Next.js standalone server so it can resolve `next` at runtime.
  include:
    - "databricks/app/_stage/**"
    - "databricks/app/_stage/node_modules/**"
  exclude:
    # Exclude node_modules everywhere EXCEPT the assembled app stage.
    - "node_modules/"
    - "apps/**/node_modules/**"
    - "packages/**/node_modules/**"
    - "tools/**/node_modules/**"
    - "**/.next/cache/**"
    - "**/.turbo/**"
    - ".git/"
    - "**/coverage/**"
    - "**/dist/**"
    - "databricks/app/server/"
    - "*.log"

targets:
  octopus-ai:
    default: true
    mode: development
    workspace:
      host: https://fevm-octopus-ai.cloud.databricks.com
      profile: octopus-ai
    run_as:
      user_name: ${workspace.current_user.userName}
