services:
  web:
    # Use the published GHCR image by default. Override OCTOPUS_VERSION to
    # pin a specific release. For local development against unreleased code,
    # `docker compose build` against the same Dockerfile still works.
    image: ghcr.io/octopusreview/octopus:${OCTOPUS_VERSION:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "43300:3000"
    environment:
      - DATABASE_URL=postgresql://octopus:octopus@postgres:5432/octopus
      - QDRANT_URL=http://qdrant:6333
      - ENABLE_REVIEW_WORKERS=true
      # Single source of truth — Next.js inlines NEXT_PUBLIC_* into the client
      # bundle and also exposes it on the server, so one var covers both
      # the SettingsNav (client) and the /settings/updates page (server).
      - NEXT_PUBLIC_OCTOPUS_SELF_HOSTED=true
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "43332:5432"
    environment:
      POSTGRES_USER: octopus
      POSTGRES_PASSWORD: octopus
      POSTGRES_DB: octopus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octopus"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports:
      - "43333:6333"
      - "43334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
