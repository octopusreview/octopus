services:
  web:
    # Use the published GHCR image by default. Override OCTOPUS_VERSION to
    # pin a specific release. For local development against unreleased code,
    # `docker compose build` against the same Dockerfile still works.
    image: ghcr.io/octopusreview/octopus:${OCTOPUS_VERSION:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "43300:3000"
    # Mount the root .env into the container so BETTER_AUTH_SECRET, OAuth
    # secrets, AI provider keys, and integration credentials reach the app.
    # Without env_file, Compose only uses .env for variable substitution
    # *inside this compose file* and the running container would start with
    # an empty env, breaking auth at first request.
    # required:false lets `docker compose up` succeed before the user has
    # created .env from .env.example (e.g. a no-config local smoke test
    # with hardcoded service vars still works).
    env_file:
      - path: .env
        required: false
    environment:
      # Compose interpolates ${VAR:-default} from .env (or shell); the
      # postgres service below uses the same vars, so changing the password
      # in one place flows through to both. Keep these in sync.
      # These `environment:` entries are last-wins — they override any
      # values of the same name in .env, which is what we want for the
      # in-cluster service hostnames and the SELF_HOSTED flag.
      - DATABASE_URL=postgresql://${POSTGRES_USER:-octopus}:${POSTGRES_PASSWORD:-octopus}@postgres:5432/${POSTGRES_DB:-octopus}
      - QDRANT_URL=http://qdrant:6333
      - ENABLE_REVIEW_WORKERS=true
      # Single source of truth — Next.js inlines NEXT_PUBLIC_* into the client
      # bundle and also exposes it on the server, so one var covers both
      # the SettingsNav (client) and the /settings/updates page (server).
      - NEXT_PUBLIC_OCTOPUS_SELF_HOSTED=true
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    # Bind side-services to loopback so they're reachable from the host for
    # debugging (psql, etc.) without being published on 0.0.0.0. Docker port
    # mappings without an address bypass ufw/iptables and expose the service
    # to the public internet — combined with the default octopus/octopus
    # password below that's a full DB takeover from anywhere. Set
    # OCTOPUS_PG_BIND=0.0.0.0 in `.env` to override for a deployment that
    # genuinely needs remote DB access (and CHANGE THE PASSWORD).
    ports:
      - "${OCTOPUS_PG_BIND:-127.0.0.1}:43332:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-octopus}
      # Hardcoded default is intentionally "octopus" to keep zero-config local
      # dev working. SELF-HOSTERS MUST set POSTGRES_PASSWORD in their `.env` —
      # see the self-hosting docs at /docs/self-hosting (rendered from
      # apps/web/app/(landing)/docs/self-hosting/page.tsx) for rotation
      # guidance; CHANGELOG's "Unreleased" entry also documents this break.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-octopus}
      POSTGRES_DB: ${POSTGRES_DB:-octopus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-octopus}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.17.0
    # Same loopback-by-default rationale as postgres. Qdrant ships with no
    # authentication out of the box, so a public bind = full read/write
    # access to every embedding in the org (which include source code).
    # Override with OCTOPUS_QDRANT_BIND=0.0.0.0 if remote access is required;
    # consider enabling QDRANT__SERVICE__API_KEY first.
    ports:
      - "${OCTOPUS_QDRANT_BIND:-127.0.0.1}:43333:6333"
      - "${OCTOPUS_QDRANT_BIND:-127.0.0.1}:43334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
