worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Timeouts for long-running review operations
  proxy_connect_timeout 10s;
  proxy_read_timeout 900s;
  proxy_send_timeout 900s;

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  server {
    listen 80;
    listen 443 ssl;

    ssl_certificate /etc/nginx/ssl/ssl.crt;
    ssl_certificate_key /etc/nginx/ssl/ssl.key;

    # Docker DNS resolver for dynamic upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $web_upstream http://web:3000;
    set $engine_upstream http://review-engine:3000;

    # Default proxy headers (inherited by locations without their own proxy_set_header)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Webhook routes -> review-engine
    location /api/github/webhook {
      proxy_pass $engine_upstream;
    }

    location /api/bitbucket/webhook {
      proxy_pass $engine_upstream;
    }

    # CLI heavy endpoints -> review-engine
    location ~ ^/api/cli/[^/]+/review$ {
      proxy_pass $engine_upstream;
    }

    location ~ ^/api/cli/[^/]+/local-review$ {
      proxy_pass $engine_upstream;
    }

    location ~ ^/api/cli/[^/]+/index$ {
      proxy_pass $engine_upstream;
    }

    location ~ ^/api/cli/[^/]+/analyze$ {
      proxy_pass $engine_upstream;
    }

    # GitHub Action review endpoint -> review-engine
    location /api/github-action/ {
      proxy_pass $engine_upstream;
    }

    # Everything else -> web
    location / {
      proxy_pass $web_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_buffering off;
    }
  }
}
