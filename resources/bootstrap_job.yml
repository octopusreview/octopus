# Bootstrap job — provisions resources NOT yet declarable in the DAB schema:
#   1. Lakebase Autoscale project + branch + endpoint (scale-to-zero)
#   2. 7 Vector Search Direct Access indexes (code/knowledge/review/chat/flowchart/docs/feedback)
# Idempotent: re-running the job is safe; existing resources are skipped.

resources:
  jobs:
    bootstrap_job:
      name: "[${bundle.target}] Octopus bootstrap (Lakebase + VS indexes)"
      max_concurrent_runs: 1
      timeout_seconds: 1800
      tasks:
        # Lakebase is now provisioned declaratively via resources/lakebase.yml
        # (Autoscale SDK isn't available yet). Only VS indexes remain in this job.
        - task_key: create_indexes
          environment_key: bootstrap_env
          spark_python_task:
            python_file: ../databricks/bootstrap/create_indexes.py
            parameters:
              - "--endpoint=${resources.vector_search_endpoints.octopus_vs.name}"
              - "--catalog=${var.catalog}"
              - "--schema=${var.vs_schema}"
              - "--dimension=${var.vs_dimension}"
      environments:
        - environment_key: bootstrap_env
          spec:
            client: "1"
            dependencies:
              - databricks-sdk>=0.81.0
