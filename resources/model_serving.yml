# AI Gateway external-model endpoints for Octopus.
# Three chat endpoints (Claude / OpenAI / Gemini) + one embeddings endpoint.
# Upstream API keys live in the octopus-octopus-ai secret scope; the app talks
# only to the Databricks endpoint URLs, not the upstream providers.

resources:
  model_serving_endpoints:
    octopus_claude:
      name: octopus-claude
      config:
        served_entities:
          - name: claude-sonnet-4-6
            external_model:
              name: claude-sonnet-4-6-20250619
              provider: anthropic
              task: llm/v1/chat
              anthropic_config:
                anthropic_api_key: "{{secrets/octopus-octopus-ai/anthropic_api_key}}"
      ai_gateway:
        usage_tracking_config:
          enabled: true
        inference_table_config:
          enabled: true
          catalog_name: ${var.catalog}
          schema_name: ${var.gateway_schema}
          table_name_prefix: claude
        rate_limits:
          - calls: 1000
            renewal_period: minute
            key: endpoint

    octopus_openai:
      name: octopus-openai
      config:
        served_entities:
          - name: gpt-4o
            external_model:
              name: gpt-4o
              provider: openai
              task: llm/v1/chat
              openai_config:
                openai_api_key: "{{secrets/octopus-octopus-ai/openai_api_key}}"
      ai_gateway:
        usage_tracking_config: { enabled: true }
        inference_table_config:
          enabled: true
          catalog_name: ${var.catalog}
          schema_name: ${var.gateway_schema}
          table_name_prefix: openai_chat

    octopus_gemini:
      name: octopus-gemini
      config:
        served_entities:
          - name: gemini-2-5-pro
            external_model:
              name: gemini-2.5-pro
              provider: google-ai-studio
              task: llm/v1/chat
              google_ai_studio_config:
                google_ai_studio_api_key: "{{secrets/octopus-octopus-ai/google_api_key}}"
      ai_gateway:
        usage_tracking_config: { enabled: true }
        inference_table_config:
          enabled: true
          catalog_name: ${var.catalog}
          schema_name: ${var.gateway_schema}
          table_name_prefix: gemini

    octopus_openai_embeddings:
      name: octopus-openai-embeddings
      config:
        served_entities:
          - name: text-embedding-3-large
            external_model:
              name: text-embedding-3-large
              provider: openai
              task: llm/v1/embeddings
              openai_config:
                openai_api_key: "{{secrets/octopus-octopus-ai/openai_api_key}}"
      ai_gateway:
        usage_tracking_config: { enabled: true }
