# Secret scope for Octopus. Values pushed manually via `databricks secrets put-secret`
# after first bundle deploy — see Phase 2 / Phase 8 of the migration plan.

resources:
  secret_scopes:
    octopus_secrets:
      name: ${var.secret_scope}
      backend_type: DATABRICKS
      # Grant the app's service principal READ so it can resolve `valueFrom: <secret>`
      # bindings at app startup. SP id below is the App's auto-provisioned identity.
      permissions:
        - service_principal_name: 9e8c7027-003d-466d-bb5a-58fdbdf1c00e
          level: READ
